<!DOCTYPE html>
<html>
<head>
<title>Solar Monitoring System</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

.card{
background:white;
padding:20px;
margin:20px;
display:inline-block;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.value{
font-size:28px;
color:#0077ff;
}
</style>

</head>

<body>

<h1>Solar Panel Monitoring</h1>

<div class="card">
Voltage
<div id="voltage" class="value">--</div>
</div>

<div class="card">
Current
<div id="current" class="value">--</div>
</div>

<div class="card">
Power
<div id="power" class="value">--</div>
</div>

<div class="card">
Light
<div id="lux" class="value">--</div>
</div>

<div class="card">
Temperature
<div id="temp" class="value">--</div>
</div>

<div class="card">
Humidity
<div id="hum" class="value">--</div>
</div>

<script>

const espIP = "http://10.66.232.175/data"; // CHANGE TO YOUR ESP32 IP

function loadData()
{
fetch(espIP)
.then(response => response.json())
.then(data => {

document.getElementById("voltage").innerHTML = data.voltage + " V";
document.getElementById("current").innerHTML = data.current + " mA";
document.getElementById("power").innerHTML = data.power + " W";
document.getElementById("lux").innerHTML = data.lux + " lux";
document.getElementById("temp").innerHTML = data.temperature + " °C";
document.getElementById("hum").innerHTML = data.humidity + " %";

});
}

setInterval(loadData,2000);

</script>

</body>
</html>
